<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理端</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>管理端</h1>

    <div id="loginCard" class="card">
      <label for="adminCode">請輸入管理碼</label>
      <input id="adminCode" type="password" placeholder="請輸入管理碼" />
      <button id="verifyBtn">進入管理端</button>
      <p id="loginMessage" class="message"></p>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="card">
        <h2>學生查詢</h2>
        <label for="keyword">學號或姓名</label>
        <input id="keyword" type="text" placeholder="請輸入學生學號或姓名" />
        <button id="searchBtn">搜尋學生</button>
        <p id="searchMessage" class="message"></p>
      </div>

      <div id="searchResultsCard" class="card hidden">
        <h2>搜尋結果</h2>
        <div id="searchResults"></div>
      </div>

      <div id="studentCard" class="card hidden">
        <h2>學生資料</h2>
        <div class="result-grid">
          <div>班級</div><div id="rClass"></div>
          <div>座號</div><div id="rSeat"></div>
          <div>學號</div><div id="rStudentId"></div>
          <div>姓名</div><div id="rName"></div>
          <div>剩餘點數</div><div id="rPoints"></div>
        </div>

        <hr />

        <label for="actionMode">操作類型</label>
        <select id="actionMode">
          <option value="deduct">扣點</option>
          <option value="add">加點</option>
        </select>

        <label for="adjustPoints">點數</label>
        <input id="adjustPoints" type="number" min="1" placeholder="例如：10" />

        <label for="note">備註</label>
        <input id="note" type="text" placeholder="例如：兌換獎品 / 表現優良加點" />

        <button id="adjustBtn">確認送出</button>
        <p id="adjustMessage" class="message"></p>
      </div>
    </div>

    <div class="back-area">
      <a href="index.html">回首頁</a>
    </div>
  </main>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJbdCeCZjLQth7OS-pjuMd23jO8P2YpJ5vIa5bZZ494JLnPZGgBNciO5ZQOgZOAs2X/exec';

    let verifiedAdminCode = '';
    let currentStudent = null;

    const loginCard = document.getElementById('loginCard');
    const adminPanel = document.getElementById('adminPanel');
    const adminCodeInput = document.getElementById('adminCode');
    const verifyBtn = document.getElementById('verifyBtn');
    const loginMessage = document.getElementById('loginMessage');

    const keywordInput = document.getElementById('keyword');
    const searchBtn = document.getElementById('searchBtn');
    const searchMessage = document.getElementById('searchMessage');

    const searchResultsCard = document.getElementById('searchResultsCard');
    const searchResults = document.getElementById('searchResults');

    const studentCard = document.getElementById('studentCard');
    const actionModeSelect = document.getElementById('actionMode');
    const adjustPointsInput = document.getElementById('adjustPoints');
    const noteInput = document.getElementById('note');
    const adjustBtn = document.getElementById('adjustBtn');
    const adjustMessage = document.getElementById('adjustMessage');

    function setText(id, value) {
      document.getElementById(id).textContent = value ?? '';
    }

    function setLoginMessage(text, isError = false) {
      loginMessage.textContent = text;
      loginMessage.className = isError ? 'message error' : 'message';
    }

    function setSearchMessage(text, isError = false) {
      searchMessage.textContent = text;
      searchMessage.className = isError ? 'message error' : 'message';
    }

    function setAdjustMessage(text, isError = false) {
      adjustMessage.textContent = text;
      adjustMessage.className = isError ? 'message error' : 'message';
    }

    function clearStudentPanel() {
      currentStudent = null;
      studentCard.classList.add('hidden');
      adjustPointsInput.value = '';
      noteInput.value = '';
      setAdjustMessage('');
    }

    function showStudent(data) {
      setText('rClass', data.className);
      setText('rSeat', data.seatNo);
      setText('rStudentId', data.studentId);
      setText('rName', data.name);
      setText('rPoints', data.points);
      currentStudent = data;
      studentCard.classList.remove('hidden');
      setAdjustMessage('');
      adjustPointsInput.value = '';
      noteInput.value = '';
    }

    function renderSearchResults(list) {
      searchResults.innerHTML = '';

      if (!list || list.length === 0) {
        searchResults.innerHTML = '<p class="message error">查無符合資料</p>';
        searchResultsCard.classList.remove('hidden');
        return;
      }

      list.forEach(student => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'result-item-button';
        btn.innerHTML = `
          <div class="result-item-main">
            <strong>${student.name}</strong>
            <span>${student.className}／座號 ${student.seatNo}</span>
          </div>
          <div class="result-item-side">
            學號：${student.studentId}｜剩餘點數：${student.points}
          </div>
        `;
        btn.addEventListener('click', () => showStudent(student));
        searchResults.appendChild(btn);
      });

      searchResultsCard.classList.remove('hidden');
    }

    async function verifyAdminCode() {
      const adminCode = adminCodeInput.value.trim();

      if (!adminCode) {
        setLoginMessage('請輸入管理碼', true);
        return;
      }

      setLoginMessage('驗證中...');

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'verifyAdminCode',
            adminCode
          })
        });

        const data = await res.json();

        if (!data.success) {
          setLoginMessage(data.message || '驗證失敗', true);
          return;
        }

        verifiedAdminCode = adminCode;
        setLoginMessage('驗證成功');
        loginCard.classList.add('hidden');
        adminPanel.classList.remove('hidden');
      } catch (err) {
        console.error(err);
        setLoginMessage('系統連線失敗，請稍後再試', true);
      }
    }

    async function searchStudent() {
      const keyword = keywordInput.value.trim();

      if (!keyword) {
        setSearchMessage('請輸入學號或姓名', true);
        return;
      }

      setSearchMessage('查詢中...');
      searchResultsCard.classList.add('hidden');
      clearStudentPanel();

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'searchStudents',
            adminCode: verifiedAdminCode,
            keyword
          })
        });

        const data = await res.json();

        if (!data.success) {
          setSearchMessage(data.message || '查詢失敗', true);
          return;
        }

        setSearchMessage(`查詢成功，共 ${data.data.length} 筆`);
        renderSearchResults(data.data);
      } catch (err) {
        console.error(err);
        setSearchMessage('系統連線失敗，請稍後再試', true);
      }
    }

    async function adjustPoints() {
      if (!currentStudent) {
        setAdjustMessage('請先選擇學生', true);
        return;
      }

      const mode = actionModeSelect.value;
      const points = Number(adjustPointsInput.value);
      const note = noteInput.value.trim();

      if (!Number.isFinite(points) || points <= 0) {
        setAdjustMessage('請輸入正確的點數', true);
        return;
      }

      const currentPoints = Number(currentStudent.points) || 0;
      const newPoints = mode === 'deduct'
        ? currentPoints - points
        : currentPoints + points;

      if (mode === 'deduct' && newPoints < 0) {
        setAdjustMessage(`點數不足，目前只有 ${currentPoints} 點`, true);
        return;
      }

      const actionText = mode === 'deduct' ? '扣點' : '加點';

      const ok = confirm(
        `確認${actionText}？\n\n` +
        `學生：${currentStudent.name}\n` +
        `目前點數：${currentPoints}\n` +
        `${actionText}點數：${points}\n` +
        `調整後剩餘：${newPoints}`
      );

      if (!ok) return;

      setAdjustMessage('處理中...');

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'adjustPoints',
            adminCode: verifiedAdminCode,
            studentId: currentStudent.studentId,
            mode,
            points,
            note
          })
        });

        const data = await res.json();

        if (!data.success) {
          setAdjustMessage(data.message || `${actionText}失敗`, true);
          return;
        }

        const updatedStudent = {
          ...currentStudent,
          points: data.data.newPoints
        };

        showStudent(updatedStudent);
        setAdjustMessage(`${actionText}成功，剩餘點數：${data.data.newPoints}`);
      } catch (err) {
        console.error(err);
        setAdjustMessage('系統連線失敗，請稍後再試', true);
      }
    }

    verifyBtn.addEventListener('click', verifyAdminCode);
    searchBtn.addEventListener('click', searchStudent);
    adjustBtn.addEventListener('click', adjustPoints);

    adminCodeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyAdminCode();
    });

    keywordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchStudent();
    });
  </script>
</body>
</html>
